<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Board — Sports Quiz Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch-dark: #0B3D2E;
    --pitch: #12503D;
    --chalk: #F5F3EA;
    --amber: #FFB627;
    --amber-dim: #C98F1B;
    --ink: #14201C;
    --line: rgba(245,243,234,0.14);
    --card: #0E4636;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--pitch-dark);
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 90px);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 40px 24px 80px; }

  header { text-align: center; margin-bottom: 36px; }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3em;
    font-size: 12px;
    color: var(--amber);
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 56px);
    letter-spacing: 0.01em;
    margin: 8px 0 6px;
    text-transform: uppercase;
  }
  .sub { color: rgba(245,243,234,0.65); font-size: 15px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 160px; }
  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 8px;
  }
  select, input[type=number] {
    width: 100%;
    background: var(--pitch-dark);
    border: 1px solid var(--line);
    color: var(--chalk);
    padding: 12px 14px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
  }
  select:focus, input:focus, button:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 1px;
  }

  .actions { display: flex; gap: 12px; margin-top: 20px; }
  button {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 4px;
    padding: 14px 22px;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--amber); color: var(--ink); flex: 1; }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-secondary { background: transparent; color: var(--chalk); border: 1px solid var(--line); }
  .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
  .btn-secondary:disabled, .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  .meta-strip {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: rgba(245,243,234,0.55);
    margin-top: 14px;
  }

  #status { text-align: center; padding: 30px 0; color: var(--amber); font-family: 'Space Mono', monospace; display: none; }
  #error { text-align: center; padding: 16px; color: #FF8A65; font-family: 'Space Mono', monospace; display: none; border: 1px solid #FF8A65; border-radius: 4px; margin-bottom: 20px; }

  .qcard {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 18px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    animation: flip-in 0.4s ease forwards;
  }
  @keyframes flip-in { to { opacity: 1; transform: translateY(0); } }

  .qhead {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .qnum {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--amber);
    min-width: 34px;
  }
  .qtext { font-size: 17px; font-weight: 500; line-height: 1.4; }

  .options { padding: 14px 20px 6px; display: grid; gap: 10px; }
  .opt {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid var(--line);
    font-size: 14.5px;
    cursor: pointer;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
    color: var(--chalk);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .opt:hover:not(:disabled) { border-color: var(--amber-dim); }
  .opt:disabled { cursor: default; }
  .opt .letter {
    font-family: 'Space Mono', monospace;
    color: var(--amber-dim);
    font-weight: 700;
  }
  /* Revealed after the user answers */
  .opt.correct { border-color: var(--amber); background: rgba(255,182,39,0.1); }
  .opt.correct .letter { color: var(--amber); }
  .opt.incorrect { border-color: #FF8A65; background: rgba(255,138,101,0.08); }
  .opt.incorrect .letter { color: #FF8A65; }
  .opt.dimmed { opacity: 0.45; }

  .result-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: auto;
    padding-left: 10px;
  }
  .result-tag.correct-tag { color: var(--amber); }
  .result-tag.incorrect-tag { color: #FF8A65; }

  .explain {
    margin: 4px 20px 18px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.18);
    border-left: 3px solid var(--amber);
    font-size: 13.5px;
    color: rgba(245,243,234,0.85);
    border-radius: 0 4px 4px 0;
    display: none;
  }
  .explain.visible { display: block; }
  .explain b { color: var(--amber); }

  .score-banner {
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    letter-spacing: 0.03em;
    color: var(--amber);
    margin: 24px 0 4px;
    text-transform: uppercase;
    display: none;
  }
  .score-banner.visible { display: block; }

  footer { text-align: center; margin-top: 40px; font-size: 12px; color: rgba(245,243,234,0.35); font-family: 'Space Mono', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">AI Agent · RAG + Web Search</div>
    <h1>Quiz Board</h1>
    <div class="sub">Pick a sport and difficulty. Answer each question to reveal if you're right.</div>
  </header>

  <div class="panel">
    <div class="row">
      <div class="field">
        <label for="sport">Sport</label>
        <select id="sport"></select>
      </div>
      <div class="field">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty"></select>
      </div>
      <div class="field" style="max-width: 140px;">
        <label for="numq">Questions</label>
        <select id="numq">
          <option value="4">4</option>
          <option value="5" selected>5</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="generateBtn">Generate Quiz</button>
      <button class="btn-secondary" id="regenerateBtn" disabled>Regenerate</button>
    </div>
    <div class="meta-strip" id="metaStrip"></div>
  </div>

  <div id="error"></div>
  <div id="status">FETCHING FACTS FROM CHROMADB + WEB SEARCH…</div>
  <div class="score-banner" id="scoreBanner"></div>
  <div id="quizContainer"></div>

  <footer>Sports Quiz Generation Agent · ChromaDB retrieval + live web search + Gemini/OpenAI</footer>
</div>

<script>
const API = '';
let previousQuestions = [];

async function loadMeta() {
  const res = await fetch(`${API}/api/meta`);
  const data = await res.json();
  const sportSel = document.getElementById('sport');
  const diffSel = document.getElementById('difficulty');
  data.sports.forEach(s => sportSel.appendChild(new Option(s, s)));
  data.difficulties.forEach(d => diffSel.appendChild(new Option(d, d)));
  diffSel.value = 'Medium';
}

function setLoading(loading) {
  document.getElementById('status').style.display = loading ? 'block' : 'none';
  document.getElementById('generateBtn').disabled = loading;
  document.getElementById('regenerateBtn').disabled = loading || previousQuestions.length === 0;
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function renderQuiz(data) {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  const scoreState = { correct: 0, answered: 0, total: data.questions.length };

  const banner = document.getElementById('scoreBanner');
  banner.classList.remove('visible');

  data.questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.style.animationDelay = `${i * 0.06}s`;

    const optsHtml = letters.map(L => `
      <button type="button" class="opt" data-letter="${L}">
        <span class="letter">${L}</span><span>${q.options[L]}</span>
      </button>`).join('');

    card.innerHTML = `
      <div class="qhead">
        <div class="qnum">${String(i + 1).padStart(2, '0')}</div>
        <div class="qtext">${q.question}</div>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="explain"><b>Why:</b> ${q.explanation}</div>
    `;
    container.appendChild(card);

    const optButtons = card.querySelectorAll('.opt');
    optButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (card.dataset.answered) return;
        card.dataset.answered = 'true';

        const picked = btn.dataset.letter;
        const isCorrect = picked === q.correct_answer;

        optButtons.forEach(b => {
          b.disabled = true;
          if (b.dataset.letter === q.correct_answer) {
            b.classList.add('correct');
            b.insertAdjacentHTML('beforeend', '<span class="result-tag correct-tag">Correct</span>');
          } else if (b.dataset.letter === picked) {
            b.classList.add('incorrect');
            b.insertAdjacentHTML('beforeend', '<span class="result-tag incorrect-tag">Your pick</span>');
          } else {
            b.classList.add('dimmed');
          }
        });

        card.querySelector('.explain').classList.add('visible');

        scoreState.answered += 1;
        if (isCorrect) scoreState.correct += 1;

        if (scoreState.answered === scoreState.total) {
          banner.textContent = `You scored ${scoreState.correct} / ${scoreState.total}`;
          banner.classList.add('visible');
        }
      });
    });
  });

  const meta = document.getElementById('metaStrip');
  meta.textContent = `Grounded on ${data.sources.vector_db_facts_used} ChromaDB fact(s) + ${data.sources.web_facts_used} live web result(s)`;

  previousQuestions = data.questions.map(q => q.question);
  document.getElementById('regenerateBtn').disabled = false;
}

async function runGeneration(avoid) {
  showError('');
  setLoading(true);
  const sport = document.getElementById('sport').value;
  const difficulty = document.getElementById('difficulty').value;
  const num_questions = parseInt(document.getElementById('numq').value, 10);

  try {
    const res = await fetch(`${API}/api/generate-quiz`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sport, difficulty, num_questions,
        avoid_questions: avoid ? previousQuestions : null,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Request failed');
    }
    const data = await res.json();
    renderQuiz(data);
  } catch (e) {
    showError(`Couldn't generate quiz: ${e.message}`);
  } finally {
    setLoading(false);
  }
}

document.getElementById('generateBtn').addEventListener('click', () => runGeneration(false));
document.getElementById('regenerateBtn').addEventListener('click', () => runGeneration(true));

loadMeta();
</script>
</body>
</html>
